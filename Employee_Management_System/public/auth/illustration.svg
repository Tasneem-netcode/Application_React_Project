<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f3f4f6"/>
  
  <!-- Desk -->
  <rect x="50" y="200" width="300" height="10" fill="#cbd5e1"/>
  <rect x="80" y="210" width="20" height="90" fill="#94a3b8"/>
  <rect x="300" y="210" width="20" height="90" fill="#94a3b8"/>

  <!-- Computer Screen -->
  <rect x="120" y="100" width="160" height="100" rx="8" fill="#1e293b"/>
  <rect x="130" y="110" width="140" height="80" rx="4" fill="#3b82f6"/>
  
  <!-- Code lines on screen -->
  <rect x="140" y="120" width="80" height="4" rx="2" fill="#bae6fd"/>
  <rect x="140" y="130" width="60" height="4" rx="2" fill="#bae6fd"/>
  <rect x="140" y="140" width="100" height="4" rx="2" fill="#bae6fd"/>
  <rect x="140" y="160" width="90" height="4" rx="2" fill="#bae6fd"/>
  
  <!-- Stand -->
  <rect x="190" y="200" width="20" height="15" fill="#475569"/>
  <path d="M180 215 H220 L210 200 H190 Z" fill="#475569"/>

  <!-- Person (Abstract) -->
  <circle cx="200" cy="90" r="30" fill="#fbbf24"/> <!-- Head -->
  <path d="M160 180 Q200 220 240 180 V210 H160 Z" fill="#f59e0b"/> <!-- Body -->
  
  <!-- Plant -->
  <rect x="320" y="160" width="40" height="40" rx="4" fill="#10b981"/>
  <path d="M340 160 Q320 120 360 140 Q350 170 340 160" fill="#34d399"/>
  <path d="M340 160 Q360 120 320 140 Q330 170 340 160" fill="#34d399"/>

  <!-- Floating Elements -->
  <circle cx="50" cy="50" r="10" fill="#c084fc" opacity="0.6"/>
  <circle cx="350" cy="80" r="15" fill="#f472b6" opacity="0.6"/>
  <rect x="80" y="40" width="20" height="20" transform="rotate(15)" fill="#60a5fa" opacity="0.6"/>
</svg>
